<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glitch-kitchen</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dragula@3.7.3/dist/dragula.min.css">
</head>
<body>
  <div class="app">
    <header>
      <a href="/" id="logo">glitch-kitchen</a>
      <div class="header-actions">
        <button id="save-btn" class="header-btn">Save</button>
        <button id="load-btn" class="header-btn">Load</button>
        <select id="pipeline-select" class="pipeline-select">
          <option value="">Load Pipeline</option>
        </select>
      </div>
      <button id="menu-btn" class="menu-btn">⚙</button>
      <input type="file" id="load-input" accept=".json" hidden>
    </header>
    
    <div id="menu-modal" class="modal menu-modal">
      <div class="menu-content">
        <button class="close-menu" id="close-menu">&times;</button>
        <h2>Settings</h2>
        <label class="setting-item">
          <input type="checkbox" id="auto-bake">
          Auto Bake
        </label>
        <label class="setting-item">
          <input type="checkbox" id="sound-enabled" checked>
          Sound
        </label>
      </div>
    </div>
    
    <main>
      <aside class="operations-panel">
        <div class="search-box">
          <input type="text" id="search" placeholder="Search operations..." autocomplete="off">
        </div>
        <div id="operations-list"></div>
      </aside>
      
      <section class="recipe-panel">
        <div id="pipelines-container" class="pipelines-wrapper"></div>
        
        <button id="add-pipeline-btn" class="add-pipeline-btn">+ Add Pipeline</button>
        
        <div class="io-container">
          <div class="input-section">
            <div class="input-area">
              <input type="file" id="image-input" accept="image/*" multiple hidden>
              <div class="input-preview" id="input-preview">
                <label for="image-input" class="upload-btn">Upload Image</label>
              </div>
            </div>
            <button id="use-output-as-input-btn" class="use-output-btn">Use Output as Input</button>
          </div>
          
          <div class="output-section">
            <div class="output-preview" id="output-preview">
              <span class="output-hint">Output will appear here</span>
            </div>
            <button id="download-output-btn" class="download-btn">Download</button>
          </div>
        </div>
        
        <div id="img-modal" class="modal" onclick="closeModal()">
          <img id="modal-img" src="" alt="">
        </div>
        
        <button id="bake-btn" class="bake-btn" disabled>Bake!</button>
      </section>
    </main>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/dragula@3.7.3/dist/dragula.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
